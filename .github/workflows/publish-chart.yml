name: Publish Chart

on:
  push:
    tags:
      - "chart-v*.*.*"

permissions: {}

env:
  REGISTRY: ghcr.io
  CHART_REGISTRY: oci://ghcr.io/gravity182/charts
  CHART_DIR: dist/chart

jobs:
  publish:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set chart release version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#chart-v}"
          chart_version="$(awk '/^version:/ {print $2}' "${CHART_DIR}/Chart.yaml")"
          app_version="$(awk '/^appVersion:/ {gsub(/"/, "", $2); print $2}' "${CHART_DIR}/Chart.yaml")"

          if [[ "${chart_version}" != "${version}" ]]; then
            echo "Chart version ${chart_version} does not match release ${version}" >&2
            exit 1
          fi
          if [[ ! "${app_version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Chart appVersion ${app_version} must look like an image tag, for example v0.1.0" >&2
            exit 1
          fi

          echo "VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Log in to Helm registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package chart
        run: |
          mkdir -p dist/packages
          helm dependency update "${CHART_DIR}"
          helm lint "${CHART_DIR}" --set adguard.url=http://adguard-home.example/control
          helm package "${CHART_DIR}" --destination dist/packages

      - name: Push chart
        run: |
          helm push "dist/packages/gateway-dns-operator-${VERSION}.tgz" "${CHART_REGISTRY}"
